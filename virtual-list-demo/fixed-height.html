<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虚拟列表 - 固定高度 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }
    .info {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .list-container {
      width: 100%;
      height: 400px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      overflow-y: auto;
      position: relative;
    }
    .list-phantom {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      z-index: -1;
    }
    .list-content {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
    }
    .list-item {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    .list-item:hover {
      background: #f5f5f5;
    }
    .item-index {
      width: 50px;
      font-weight: bold;
      color: #1890ff;
    }
    .item-content {
      flex: 1;
      color: #333;
    }
    .stats {
      margin-top: 15px;
      padding: 12px;
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 6px;
      font-size: 14px;
      color: #52c41a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>虚拟列表 - 固定高度</h1>
    <p class="info">10万条数据，只渲染可视区域约10个元素</p>
    
    <div class="list-container" id="listContainer">
      <div class="list-phantom" id="phantom"></div>
      <div class="list-content" id="content"></div>
    </div>
    
    <div class="stats" id="stats"></div>
  </div>

  <script>
    // 配置
    const TOTAL_COUNT = 100000;  // 总数据量
    const ITEM_HEIGHT = 60;      // 每项固定高度
    const BUFFER_SIZE = 5;       // 上下缓冲区大小
    
    // 生成模拟数据
    const data = Array.from({ length: TOTAL_COUNT }, (_, i) => ({
      id: i,
      content: `这是第 ${i + 1} 条数据内容`
    }));

    // DOM 元素
    const container = document.getElementById('listContainer');
    const phantom = document.getElementById('phantom');
    const content = document.getElementById('content');
    const stats = document.getElementById('stats');

    // 设置 phantom 高度（撑起滚动条）
    phantom.style.height = `${TOTAL_COUNT * ITEM_HEIGHT}px`;

    // 渲染函数
    function render() {
      const scrollTop = container.scrollTop;
      const containerHeight = container.clientHeight;
      
      // 计算可视区域的起始和结束索引
      let startIndex = Math.floor(scrollTop / ITEM_HEIGHT);
      let endIndex = Math.ceil((scrollTop + containerHeight) / ITEM_HEIGHT);
      
      // 添加缓冲区
      startIndex = Math.max(0, startIndex - BUFFER_SIZE);
      endIndex = Math.min(TOTAL_COUNT, endIndex + BUFFER_SIZE);
      
      // 计算偏移量
      const offsetY = startIndex * ITEM_HEIGHT;
      
      // 生成 HTML
      const visibleData = data.slice(startIndex, endIndex);
      content.style.transform = `translateY(${offsetY}px)`;
      
      content.innerHTML = visibleData.map((item, index) => `
        <div class="list-item" style="height: ${ITEM_HEIGHT}px">
          <span class="item-index">${item.id + 1}</span>
          <span class="item-content">${item.content}</span>
        </div>
      `).join('');
      
      // 更新统计信息
      stats.innerHTML = `
        <strong>渲染统计：</strong><br>
        总数据量：${TOTAL_COUNT.toLocaleString()} 条<br>
        渲染元素：${visibleData.length} 个（约节省 ${(100 - visibleData.length/TOTAL_COUNT*100).toFixed(4)}% 的 DOM）<br>
        当前滚动位置：${scrollTop.toFixed(0)}px<br>
        可视范围索引：${startIndex} - ${endIndex}
      `;
    }

    // 监听滚动事件（使用 requestAnimationFrame 节流）
    let ticking = false;
    container.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          render();
          ticking = false;
        });
        ticking = true;
      }
    });

    // 初始渲染
    render();
  </script>
</body>
</html>
