version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: kb_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb_network

  postgres:
    image: postgres:18.3
    container_name: kb_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_password}
      POSTGRES_DB: ${POSTGRES_DB:-kb_db}
    volumes:
      # PG 18+ 镜像：PGDATA=/var/lib/postgresql/18/docker，须挂载父目录 /var/lib/postgresql（勿再挂 .../data）
      - postgres_data:/var/lib/postgresql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-kb_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kb_network

  redis:
    image: redis:8.6.1-alpine
    container_name: kb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kb_network

volumes:
  qdrant_data:
  postgres_data:
  redis_data:

networks:
  kb_network:
    driver: bridge