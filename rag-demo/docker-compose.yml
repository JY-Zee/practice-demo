version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: kb_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb_network

  postgres:
    image: postgres:18.3
    container_name: kb_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_password}
      POSTGRES_DB: ${POSTGRES_DB:-kb_db}
    volumes:
      # PG 18+ 镜像：PGDATA=/var/lib/postgresql/18/docker，须挂载父目录 /var/lib/postgresql（勿再挂 .../data）
      - postgres_data:/var/lib/postgresql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-kb_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kb_network

  redis:
    image: redis:8.6.1-alpine
    container_name: kb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kb_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_password}
      POSTGRES_DB: ${POSTGRES_DB:-kb_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_HTTP_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-kb_documents}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      UPLOAD_DIR: /app/uploads
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: 8000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb_network

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  kb_network:
    driver: bridge